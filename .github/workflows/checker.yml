name: VPN Checker

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

env:
  XRAY_VERSION: v1.8.10
  SPEED_LIMIT: 0.4

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install deps
      run: |
        pip install aiohttp aiofiles geoip2 aiohttp-socks

    - name: Cache Xray core
      id: cache-xray
      uses: actions/cache@v3
      with:
        path: ./core
        key: xray-${{ env.XRAY_VERSION }}

    - name: Download Xray (if not cached)
      if: steps.cache-xray.outputs.cache-hit != 'true'
      run: |
        mkdir -p core
        cd core
        curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/download/${{ env.XRAY_VERSION }}/Xray-linux-64.zip
        unzip -o xray.zip
        chmod +x xray

    - name: Ignore core folder
      run: |
        echo "core/" >> .gitignore
        git rm -r --cached core 2>/dev/null || true

    - name: Run checker
      run: python checker/launcher.py
      env:
        SPEED_LIMIT: ${{ env.SPEED_LIMIT }}

    - name: Commit results
      run: |
        git config --global user.name "grayvpn-bot"
        git config --global user.email "bot@users.noreply.github.com"

        git add best_nodes.txt

        git commit -m "update nodes $(date)" || echo "no changes"

        git push